<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Google Sans", Roboto, Arial, sans-serif;
        font-size: 13px;
        color: #202124;
        background: #fff;
      }

      /* ── Tabs ────────────────────────────────────── */

      .tabs {
        display: flex;
        border-bottom: 1px solid #dadce0;
        position: sticky;
        top: 0;
        background: #fff;
        z-index: 10;
      }

      .tab {
        flex: 1;
        padding: 10px 0;
        text-align: center;
        font-size: 13px;
        font-weight: 500;
        color: #5f6368;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
      }

      .tab:hover {
        color: #1a73e8;
        background: #f1f3f4;
      }

      .tab.active {
        color: #1a73e8;
        border-bottom-color: #1a73e8;
      }

      /* ── Search ──────────────────────────────────── */

      .search-bar {
        padding: 8px 12px;
        border-bottom: 1px solid #dadce0;
      }

      .search-bar input {
        width: 100%;
        padding: 6px 10px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        font-size: 13px;
        outline: none;
      }

      .search-bar input:focus {
        border-color: #1a73e8;
      }

      /* ── Panels ──────────────────────────────────── */

      .panel {
        display: none;
      }

      .panel.active {
        display: block;
      }

      /* ── Package list ────────────────────────────── */

      .package-list {
        list-style: none;
      }

      .package-item {
        padding: 10px 12px;
        border-bottom: 1px solid #f1f3f4;
        cursor: pointer;
        transition: background 0.1s;
      }

      .package-item:hover {
        background: #f8f9fa;
      }

      .package-name {
        font-weight: 500;
        color: #1a73e8;
      }

      .package-version {
        color: #5f6368;
        font-size: 11px;
        margin-left: 4px;
      }

      .package-desc {
        color: #5f6368;
        margin-top: 2px;
        font-size: 12px;
      }

      /* ── Detail view ─────────────────────────────── */

      .detail-view {
        display: none;
        padding: 12px;
      }

      .detail-view.active {
        display: block;
      }

      .back-btn {
        background: none;
        border: none;
        color: #1a73e8;
        cursor: pointer;
        font-size: 13px;
        padding: 0;
        margin-bottom: 10px;
      }

      .back-btn:hover {
        text-decoration: underline;
      }

      .detail-name {
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 2px;
      }

      .detail-version {
        color: #5f6368;
        margin-bottom: 8px;
      }

      .detail-desc {
        margin-bottom: 12px;
        line-height: 1.4;
      }

      .detail-section {
        margin-bottom: 12px;
      }

      .detail-section h3 {
        font-size: 12px;
        font-weight: 500;
        color: #5f6368;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }

      .func-list {
        list-style: none;
      }

      .func-item {
        padding: 4px 0;
        font-family: "Google Sans Mono", "Roboto Mono", monospace;
        font-size: 12px;
      }

      .dep-list {
        list-style: none;
      }

      .dep-item {
        padding: 2px 0;
        font-size: 12px;
      }

      /* ── Buttons ─────────────────────────────────── */

      .btn {
        display: inline-block;
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
      }

      .btn-primary {
        background: #1a73e8;
        color: #fff;
      }

      .btn-primary:hover {
        background: #1557b0;
      }

      .btn-primary:disabled {
        background: #dadce0;
        color: #5f6368;
        cursor: default;
      }

      .btn-danger {
        background: #fff;
        color: #d93025;
        border: 1px solid #dadce0;
      }

      .btn-danger:hover {
        background: #fce8e6;
      }

      .btn-outline {
        background: #fff;
        color: #1a73e8;
        border: 1px solid #dadce0;
      }

      .btn-outline:hover {
        background: #f1f3f4;
      }

      /* ── Status ──────────────────────────────────── */

      .status {
        padding: 8px 12px;
        margin: 8px 12px;
        border-radius: 4px;
        font-size: 12px;
        display: none;
      }

      .status.visible {
        display: block;
      }

      .status.info {
        background: #e8f0fe;
        color: #1a73e8;
      }

      .status.error {
        background: #fce8e6;
        color: #d93025;
      }

      .status.success {
        background: #e6f4ea;
        color: #137333;
      }

      /* ── Loading / Empty ─────────────────────────── */

      .loading {
        text-align: center;
        padding: 24px;
        color: #5f6368;
      }

      .empty {
        text-align: center;
        padding: 24px;
        color: #80868b;
      }

      /* ── Installed badge ─────────────────────────── */

      .installed-badge {
        display: inline-block;
        font-size: 10px;
        background: #e6f4ea;
        color: #137333;
        padding: 1px 6px;
        border-radius: 3px;
        margin-left: 4px;
        font-weight: 500;
      }

      .installed-funcs {
        color: #80868b;
        font-size: 11px;
        margin-top: 2px;
      }

      /* ── Project / Init ──────────────────────────── */

      .init-view {
        padding: 24px 16px;
        text-align: center;
      }

      .init-view p {
        color: #5f6368;
        margin-bottom: 16px;
        line-height: 1.5;
      }

      .form-group {
        margin-bottom: 10px;
        text-align: left;
      }

      .form-group label {
        display: block;
        font-size: 11px;
        font-weight: 500;
        color: #5f6368;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 3px;
      }

      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 6px 10px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        font-size: 13px;
        font-family: inherit;
        outline: none;
      }

      .form-group input:focus,
      .form-group textarea:focus {
        border-color: #1a73e8;
      }

      .form-group textarea {
        resize: vertical;
        min-height: 48px;
      }

      .project-fields {
        padding: 12px;
      }

      .field-row {
        display: flex;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid #f1f3f4;
      }

      .field-row:last-child {
        border-bottom: none;
      }

      .field-label {
        width: 90px;
        font-size: 12px;
        font-weight: 500;
        color: #5f6368;
        flex-shrink: 0;
      }

      .field-value {
        flex: 1;
        font-size: 13px;
        min-width: 0;
      }

      .field-value input {
        width: 100%;
        padding: 3px 6px;
        border: 1px solid transparent;
        border-radius: 3px;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        background: transparent;
      }

      .field-value input:hover {
        border-color: #dadce0;
      }

      .field-value input:focus {
        border-color: #1a73e8;
        background: #fff;
      }

      .field-value input.saving {
        color: #5f6368;
      }

      .project-section-header {
        padding: 10px 12px 4px;
        font-size: 11px;
        font-weight: 500;
        color: #5f6368;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div id="main-app">
      <div class="tabs">
        <div
          class="tab"
          data-panel="project"
          onclick="switchTab('project')"
        >
          Project
        </div>
        <div
          class="tab active"
          data-panel="browse"
          onclick="switchTab('browse')"
        >
          Browse
        </div>
        <div
          class="tab"
          data-panel="installed"
          onclick="switchTab('installed')"
        >
          Installed
        </div>
      </div>

      <!-- Project panel -->
      <div id="project-panel" class="panel">
        <div id="project-not-init" style="display:none">
          <div class="init-view">
            <p>No project metadata yet. Initialize to set up package name, version, and other metadata for publishing.</p>
            <div class="form-group">
              <label>Project name</label>
              <input type="text" id="init-name" placeholder="my-package" />
            </div>
            <div class="form-group">
              <label>Description</label>
              <input type="text" id="init-desc" placeholder="Optional" />
            </div>
            <div style="margin-top: 16px">
              <button class="btn btn-primary" onclick="doInit()">Initialize project</button>
            </div>
          </div>
        </div>
        <div id="project-initialized" style="display:none">
          <div class="project-section-header">Manifest</div>
          <div class="project-fields" id="project-fields"></div>
          <div class="project-section-header">Dependencies</div>
          <div class="project-fields" id="project-deps"></div>
        </div>
      </div>

      <!-- Browse panel -->
      <div id="browse-panel" class="panel active">
        <div class="search-bar">
          <input
            type="text"
            id="search"
            placeholder="Search packages..."
            oninput="filterPackages()"
          />
        </div>
        <div id="status" class="status"></div>
        <ul id="package-list" class="package-list">
          <li class="loading">Loading packages...</li>
        </ul>
      </div>

      <!-- Installed panel -->
      <div id="installed-panel" class="panel">
        <ul id="installed-list" class="package-list">
          <li class="loading">Loading...</li>
        </ul>
      </div>

      <!-- Detail view (overlays the list) -->
      <div id="detail-view" class="detail-view">
        <button class="back-btn" onclick="hideDetail()">&larr; Back</button>
        <div class="detail-name" id="detail-name"></div>
        <div class="detail-version" id="detail-version"></div>
        <div class="detail-desc" id="detail-desc"></div>

        <div id="detail-actions" style="margin-bottom: 12px"></div>

        <div class="detail-section" id="detail-deps-section">
          <h3>Dependencies</h3>
          <ul class="dep-list" id="detail-deps"></ul>
        </div>

        <div class="detail-section" id="detail-funcs-section">
          <h3>Functions</h3>
          <ul class="func-list" id="detail-funcs"></ul>
        </div>

        <div class="detail-section" id="detail-owners-section">
          <h3>Owners</h3>
          <div id="detail-owners"></div>
        </div>
      </div>
    </div>

    <script>
      var allPackages = [];
      var installedMap = {};
      var currentMeta = null;

      var MANIFEST_FIELDS = [
        { key: "name", label: "Name", placeholder: "my-package" },
        { key: "version", label: "Version", placeholder: "0.1.0" },
        { key: "description", label: "Description", placeholder: "" },
        { key: "license", label: "License", placeholder: "MIT" },
        { key: "owners", label: "Owners", placeholder: "username" },
        { key: "exports", label: "Exports", placeholder: "FUNC_A, FUNC_B" },
      ];

      // ── Init ─────────────────────────────────────

      function doInit() {
        var name = document.getElementById("init-name").value.trim();
        var desc = document.getElementById("init-desc").value.trim();

        google.script.run
          .withSuccessHandler(function (result) {
            if (result.success) {
              loadProject();
            }
          })
          .withFailureHandler(function () {})
          .initProject({ name: name, description: desc });
      }

      // ── Tab switching ──────────────────────────────

      function switchTab(name) {
        document.querySelectorAll(".tab").forEach(function (t) {
          t.classList.toggle("active", t.dataset.panel === name);
        });
        document.querySelectorAll(".panel").forEach(function (p) {
          p.classList.toggle("active", p.id === name + "-panel");
        });
        hideDetail();
        if (name === "installed") loadInstalled();
        if (name === "project") loadProject();
      }

      // ── Project tab ────────────────────────────────

      function loadProject() {
        google.script.run
          .withSuccessHandler(function (initialized) {
            if (!initialized) {
              document.getElementById("project-not-init").style.display = "block";
              document.getElementById("project-initialized").style.display = "none";
              return;
            }
            document.getElementById("project-not-init").style.display = "none";
            document.getElementById("project-initialized").style.display = "block";
            google.script.run
              .withSuccessHandler(function (meta) {
                currentMeta = meta;
                renderProject(meta);
              })
              .readMetadata();
          })
          .isInitialized();
      }

      function renderProject(meta) {
        if (!meta) return;

        // Manifest fields
        var fieldsEl = document.getElementById("project-fields");
        fieldsEl.innerHTML = MANIFEST_FIELDS.map(function (f) {
          var val = meta[f.key] || "";
          return (
            '<div class="field-row">' +
            '<div class="field-label">' + esc(f.label) + "</div>" +
            '<div class="field-value">' +
            '<input type="text"' +
            ' data-key="' + f.key + '"' +
            ' value="' + esc(val) + '"' +
            ' placeholder="' + esc(f.placeholder) + '"' +
            ' onblur="saveField(this)"' +
            " />" +
            "</div></div>"
          );
        }).join("");

        // Dependencies
        var depsEl = document.getElementById("project-deps");
        var deps = meta.dependencies || {};
        var depNames = Object.keys(deps);
        if (depNames.length === 0) {
          depsEl.innerHTML =
            '<div class="empty" style="padding:12px">No dependencies</div>';
        } else {
          depsEl.innerHTML = depNames.map(function (name) {
            return (
              '<div class="field-row">' +
              '<div class="field-label" style="font-family:monospace;font-size:12px">' +
              esc(name) +
              "</div>" +
              '<div class="field-value">' +
              '<input type="text"' +
              ' data-key="dep:' + esc(name) + '"' +
              ' value="' + esc(deps[name]) + '"' +
              ' placeholder=">=0.0.0"' +
              ' onblur="saveField(this)"' +
              " />" +
              "</div></div>"
            );
          }).join("");
        }
      }

      function saveField(input) {
        var key = input.dataset.key;
        var value = input.value.trim();

        // Skip if unchanged
        if (currentMeta) {
          var oldVal;
          if (key.indexOf("dep:") === 0) {
            oldVal = (currentMeta.dependencies || {})[key.slice(4)] || "";
          } else {
            oldVal = currentMeta[key] || "";
          }
          if (value === oldVal) return;
        }

        input.classList.add("saving");
        google.script.run
          .withSuccessHandler(function (result) {
            input.classList.remove("saving");
            if (result.success) {
              currentMeta = result.metadata;
            }
          })
          .withFailureHandler(function () {
            input.classList.remove("saving");
          })
          .updateManifestField(key, value);
      }

      // ── Browse ─────────────────────────────────────

      function loadPackages() {
        google.script.run
          .withSuccessHandler(function (pkgs) {
            allPackages = pkgs || [];
            renderPackages(allPackages);
          })
          .withFailureHandler(function (err) {
            showStatus("Failed to load: " + err.message, "error");
            document.getElementById("package-list").innerHTML =
              '<li class="empty">Failed to load packages</li>';
          })
          .getPackageList();
      }

      function renderPackages(pkgs) {
        var list = document.getElementById("package-list");
        if (!pkgs.length) {
          list.innerHTML = '<li class="empty">No packages found</li>';
          return;
        }
        list.innerHTML = pkgs
          .map(function (p) {
            var badge = installedMap[p.name]
              ? '<span class="installed-badge">installed</span>'
              : "";
            return (
              '<li class="package-item" onclick="showDetail(\'' +
              p.name +
              "')\">" +
              '<div><span class="package-name">' +
              esc(p.name) +
              "</span>" +
              '<span class="package-version">' +
              esc(p.latest) +
              "</span>" +
              badge +
              "</div>" +
              '<div class="package-desc">' +
              esc(p.description) +
              "</div></li>"
            );
          })
          .join("");
      }

      function filterPackages() {
        var q = document.getElementById("search").value.toLowerCase();
        var filtered = allPackages.filter(function (p) {
          return (
            p.name.toLowerCase().indexOf(q) !== -1 ||
            (p.description || "").toLowerCase().indexOf(q) !== -1
          );
        });
        renderPackages(filtered);
      }

      // ── Detail view ────────────────────────────────

      function showDetail(name) {
        showStatus("Loading...", "info");
        google.script.run
          .withSuccessHandler(function (pkg) {
            clearStatus();
            if (!pkg) {
              showStatus("Package not found", "error");
              return;
            }
            renderDetail(pkg);
          })
          .withFailureHandler(function (err) {
            showStatus("Error: " + err.message, "error");
          })
          .getPackageDetails(name);
      }

      function renderDetail(pkg) {
        document.getElementById("detail-name").textContent = pkg.name;
        document.getElementById("detail-version").textContent =
          "v" + pkg.latest;
        document.getElementById("detail-desc").textContent =
          pkg.description || "No description";

        var actions = document.getElementById("detail-actions");
        var isInstalled = !!installedMap[pkg.name];
        if (isInstalled) {
          actions.innerHTML =
            '<button class="btn btn-danger" onclick="doRemove(\'' +
            pkg.name +
            '\')">Remove</button>' +
            '<span style="margin-left:8px;color:#5f6368;font-size:12px;">v' +
            esc(installedMap[pkg.name]) +
            " installed</span>";
        } else {
          actions.innerHTML =
            '<button class="btn btn-primary" onclick="doInstall(\'' +
            pkg.name +
            "', '" +
            pkg.latest +
            '\')">Install v' +
            esc(pkg.latest) +
            "</button>";
        }

        var latestVersion = (pkg.versionDetails || {})[pkg.latest] || {};
        var deps = latestVersion.dependencies || [];
        var depsEl = document.getElementById("detail-deps");
        if (typeof deps === "object" && !Array.isArray(deps)) {
          var entries = Object.keys(deps);
          depsEl.innerHTML = entries.length
            ? entries
                .map(function (d) {
                  return (
                    '<li class="dep-item">' +
                    esc(d) + " " + esc(deps[d]) +
                    "</li>"
                  );
                })
                .join("")
            : "<li>None</li>";
        } else if (Array.isArray(deps)) {
          depsEl.innerHTML = deps.length
            ? deps
                .map(function (d) {
                  return '<li class="dep-item">' + esc(d) + "</li>";
                })
                .join("")
            : "<li>None</li>";
        }

        var funcs = latestVersion.exports || latestVersion.functions || [];
        var funcsEl = document.getElementById("detail-funcs");
        funcsEl.innerHTML = funcs.length
          ? funcs
              .map(function (f) {
                return '<li class="func-item">' + esc(f) + "</li>";
              })
              .join("")
          : "<li>No exported functions</li>";

        document.getElementById("detail-owners").textContent = (
          pkg.owners || []
        ).join(", ");

        document.getElementById("browse-panel").classList.remove("active");
        document.getElementById("installed-panel").classList.remove("active");
        document.getElementById("project-panel").classList.remove("active");
        document.getElementById("detail-view").classList.add("active");
      }

      function hideDetail() {
        document.getElementById("detail-view").classList.remove("active");
        var activeTab = document.querySelector(".tab.active");
        if (activeTab) {
          var panel = document.getElementById(
            activeTab.dataset.panel + "-panel"
          );
          if (panel) panel.classList.add("active");
        }
      }

      // ── Install / Remove ───────────────────────────

      function doInstall(name, version) {
        showStatus("Installing " + name + "@" + version + "...", "info");
        google.script.run
          .withSuccessHandler(function (result) {
            if (result.success) {
              showStatus(result.message, "success");
              installedMap[name] = version;
              hideDetail();
              loadPackages();
              loadProject(); // refresh deps
            } else {
              showStatus(result.error, "error");
            }
          })
          .withFailureHandler(function (err) {
            showStatus("Install failed: " + err.message, "error");
          })
          .installPackage(name, version);
      }

      function doRemove(name) {
        showStatus("Removing " + name + "...", "info");
        google.script.run
          .withSuccessHandler(function (result) {
            if (result.success) {
              showStatus(result.message, "success");
              delete installedMap[name];
              hideDetail();
              loadPackages();
              loadProject(); // refresh deps
            } else {
              showStatus(result.error, "error");
            }
          })
          .withFailureHandler(function (err) {
            showStatus("Remove failed: " + err.message, "error");
          })
          .removePackage(name);
      }

      // ── Installed tab ──────────────────────────────

      function loadInstalled() {
        var list = document.getElementById("installed-list");
        list.innerHTML = '<li class="loading">Loading...</li>';
        google.script.run
          .withSuccessHandler(function (pkgs) {
            installedMap = {};
            (pkgs || []).forEach(function (p) {
              installedMap[p.name] = p.version;
            });
            if (!pkgs || !pkgs.length) {
              list.innerHTML =
                '<li class="empty">No packages installed</li>';
              return;
            }
            list.innerHTML = pkgs
              .map(function (p) {
                return (
                  '<li class="package-item" onclick="showDetail(\'' +
                  p.name +
                  "')\">" +
                  '<div><span class="package-name">' +
                  esc(p.name) +
                  '</span><span class="package-version">v' +
                  esc(p.version) +
                  "</span></div>" +
                  '<div class="installed-funcs">' +
                  (p.functions || []).join(", ") +
                  "</div></li>"
                );
              })
              .join("");
          })
          .withFailureHandler(function (err) {
            list.innerHTML =
              '<li class="empty">Error: ' + esc(err.message) + "</li>";
          })
          .getInstalledPackages();
      }

      // ── Util ───────────────────────────────────────

      function esc(s) {
        if (!s) return "";
        var d = document.createElement("div");
        d.textContent = String(s);
        return d.innerHTML;
      }

      function showStatus(msg, type) {
        var el = document.getElementById("status");
        if (!el) return;
        el.textContent = msg;
        el.className = "status visible " + type;
      }

      function clearStatus() {
        var el = document.getElementById("status");
        if (!el) return;
        el.className = "status";
      }

      // ── Bootstrap ──────────────────────────────────

      loadPackages();
      google.script.run
        .withSuccessHandler(function (pkgs) {
          (pkgs || []).forEach(function (p) {
            installedMap[p.name] = p.version;
          });
          renderPackages(allPackages);
        })
        .getInstalledPackages();
    </script>
  </body>
</html>
